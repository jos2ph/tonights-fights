<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>{% block title %}TonightsFights.Net{% endblock %}</title>
    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Inter:wght@800&display=swap"
      rel="stylesheet"
    />

    <link href="/static/css/styles.css" rel="stylesheet" />
    <style>
      .navbar-dark .navbar-nav .nav-link:hover {
        color: #582eff;
      }
      .navbar-brand:hover {
        color: #582eff;
      }
    </style>
  </head>
  <body class="d-flex flex-column h-100" style="background-color: #232323">
    <!-- Responsive Navbar-->
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark"
      style="font-family: 'Consolas', monospace; font-weight: 500"
    >
      <div class="container px-5">
        <a class="navbar-brand" href="/" style="font-size: 1.5rem"
          >TonightsFights.Net</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/">Home</a>
            </li>
            <li class="nav-item ms-2">
              <a class="nav-link" href="/">Boxing Schedule</a>
            </li>
            <li class="nav-item ms-2">
              <a class="nav-link" href="/mma">MMA Schedule</a>
            </li>
            <li class="nav-item ms-2">
              <a class="nav-link" href="{{url_for('support')}}">Support</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    {% block content %} {% endblock %}

    <!-- Footer-->
    <br />
    <footer class="py-5 bg-dark">
      <div
        class="container px-4 px-lg-5;"
        style="font-family: 'Consolas', monospace"
      >
        <p class="m-0 text-center text-white" style="font-size: 12px">
          © 2024 Tonight's Fights. All Rights Reserved.
        </p>
      </div>
    </footer>
    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core theme JS-->
    <script src="/static/js/scripts.js"></script>
  </body>
</html>
